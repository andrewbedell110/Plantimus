<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plantimus</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: white;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #layout {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
    }

    /* ── Plant (left half) ── */
    #plant-panel {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #plant {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* ── Shared right-panel styles ── */
    #weather-panel,
    #ai-panel {
      width: 50%;
      height: 100%;
      background: linear-gradient(160deg, #e8f5e9 0%, #f1f8e9 100%);
      border-left: 3px solid #a5d6a7;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      gap: 18px;
    }

    #weather-panel { display: flex; }
    #ai-panel      { display: none; }

    /* ── Weather panel ── */
    .weather-title {
      font-size: 3rem;
      color: #558b2f;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
    }

    .city-name {
      font-size: 4.5rem;
      color: #2e7d32;
      font-weight: 700;
      text-align: center;
    }

    .weather-icon {
      font-size: 13.5rem;
      line-height: 1;
    }

    .temperature {
      font-size: 10.5rem;
      font-weight: 800;
      color: #1b5e20;
      line-height: 1;
    }

    .description {
      font-size: 3.3rem;
      color: #388e3c;
      text-align: center;
      text-transform: capitalize;
    }

    .divider {
      width: 80%;
      border: none;
      border-top: 1px solid #c8e6c9;
    }

    .stat-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.65);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .stat-label {
      font-size: 1.95rem;
      color: #81c784;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .stat-value {
      font-size: 3rem;
      color: #2e7d32;
      font-weight: 700;
    }

    .last-updated {
      font-size: 1.95rem;
      color: #aaa;
      text-align: center;
    }

    .weather-error {
      font-size: 2.55rem;
      color: #c62828;
      text-align: center;
    }

    /* ── AI panel ── */
    #ai-panel {
      justify-content: flex-start;
      gap: 14px;
    }

    .ai-header {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .ai-title {
      font-size: 2.8rem;
      color: #558b2f;
      font-weight: 700;
    }

    .ai-badge {
      font-size: 1.6rem;
      padding: 4px 16px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .badge-listening { background: #c8e6c9; color: #2e7d32; }
    .badge-thinking  { background: #fff9c4; color: #f57f17; }
    .badge-speaking  { background: #bbdefb; color: #1565c0; }

    .ai-status {
      font-size: 2.2rem;
      color: #81c784;
      text-align: center;
      font-style: italic;
      min-height: 2.6rem;
    }

    .ai-transcript {
      font-size: 2rem;
      color: #aaa;
      text-align: center;
      font-style: italic;
      min-height: 2.4rem;
      padding: 0 8px;
    }

    .ai-response {
      flex: 1;
      width: 100%;
      background: rgba(255,255,255,0.7);
      border-radius: 16px;
      padding: 20px 24px;
      font-size: 2.5rem;
      color: #1b5e20;
      line-height: 1.55;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .ai-footer {
      font-size: 1.8rem;
      color: #bbb;
      text-align: center;
      min-height: 2.2rem;
      padding-bottom: 8px;
    }

    /* mic-denied badge sits over weather panel */
    #mic-badge {
      display: none;
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: #ffccbc;
      color: #bf360c;
      font-size: 1.6rem;
      padding: 6px 14px;
      border-radius: 999px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="layout">

    <!-- Plant -->
    <div id="plant-panel">
      <img id="plant" src="" alt="Plantimus" />
    </div>

    <!-- Weather -->
    <div id="weather-panel">
      <div class="weather-title">🌿 Plantimus Weather Station</div>
      <div class="city-name" id="w-city">—</div>
      <div class="weather-icon" id="w-icon">🌱</div>
      <div class="temperature" id="w-temp">—</div>
      <div class="description" id="w-desc">Loading...</div>
      <hr class="divider" />
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-label">💧 Humidity</div>
          <div class="stat-value" id="w-humidity">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">🍃 Wind</div>
          <div class="stat-value" id="w-wind">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">🌅 Sunrise</div>
          <div class="stat-value" id="w-sunrise">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">🌇 Sunset</div>
          <div class="stat-value" id="w-sunset">—</div>
        </div>
      </div>
      <div class="last-updated" id="w-updated">Not yet loaded</div>
    </div>

    <!-- AI -->
    <div id="ai-panel">
      <div class="ai-header">
        <span class="ai-title">🌿 Ask Plantimus</span>
        <span class="ai-badge badge-listening" id="ai-badge">Listening</span>
      </div>
      <div class="ai-status" id="ai-status">I'm listening...</div>
      <div class="ai-transcript" id="ai-transcript"></div>
      <div class="ai-response" id="ai-response"></div>
      <div class="ai-footer" id="ai-footer"></div>
    </div>

  </div>

  <div id="mic-badge">🎤 Mic needed for voice</div>

  <script src="script.js"></script>
</body>
</html>
