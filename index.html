<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plantimus</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: white;
      overflow: hidden;
    }

    #container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(180deg);
      cursor: pointer;
    }

    #plant {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="container">
    <img id="plant" src="" alt="Plantimus" />
  </div>

  <script>
    const plant = document.getElementById('plant');
    const container = document.getElementById('container');

    function getAsset() {
      const hour = new Date().getHours();

      if (hour >= 8 && hour < 18) {
        // 8am–6pm: breathing animation
        return { src: 'GIF/plant_breathing.gif', type: 'gif' };
      } else if ((hour >= 6 && hour < 8) || (hour >= 18 && hour < 20)) {
        // 6–8am and 6–8pm: yawning
        return { src: 'PNG/Yawn.png', type: 'png' };
      } else {
        // 8pm–6am: sleeping
        return { src: 'PNG/Sleep.png', type: 'png' };
      }
    }

    function update() {
      const { src } = getAsset();
      if (plant.getAttribute('src') !== src) {
        plant.src = src;
      }
    }

    // Enter fullscreen on click
    container.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    // Initial render + check every minute
    update();
    setInterval(update, 60 * 1000);
  </script>
</body>
</html>
